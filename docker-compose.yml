

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0 #image officiel
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181 # port pour ecouter les connexions
      ZOOKEEPER_TICK_TIME: 2000  # verifie que les noeuds sont toujours en ligne

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [ zookeeper ]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # On définit deux canaux de communication (INSIDE pour Docker, OUTSIDE pour ton PC)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONNECTIONS_FROM_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,CONNECTIONS_FROM_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONNECTIONS_FROM_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

#tableau de bord web pour voir ce qui ce passe

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [ kafka ]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # On utilise ici le port 29092 qui est dédié à la communication entre conteneurs
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092