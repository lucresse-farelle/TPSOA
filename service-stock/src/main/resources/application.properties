server.port=8083
spring.application.name=service-stock

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=service-stock-new
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# 1. On utilise le déserialiseur qui gère les erreurs
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# 2. On indique quel déserialiseur utiliser "derrière" (le vrai travailleur)
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer




# 4. (Optionnel) Si tu veux que Spring crée automatiquement l'objet même si le header manque
spring.kafka.consumer.properties.spring.json.value.default.type=com.tp.events.CommandeCreeEvent

spring.datasource.url=jdbc:h2:mem:stockdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.kafka.consumer.properties.spring.json.trusted.packages=com.tp.events.CommandeCreeEvent 